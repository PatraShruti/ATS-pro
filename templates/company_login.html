<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Login — ATS Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/glass-admin.css">
</head>
<body>
<div class="background"></div>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>

<div class="login-page">
    <button class="theme-toggle-float" id="theme-toggle">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo" style="background:linear-gradient(135deg,var(--amber),var(--gold));">🏢</div>
                <h1 class="login-title">Company Login</h1>
                <p class="login-subtitle">Access your hiring dashboard</p>
            </div>
            <div id="err" style="display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:11px 15px;margin-bottom:14px;font-size:13px;color:#f87171;text-align:center;"></div>
            <form id="lf">
                <div class="form-group"><label class="form-label">Email</label><input type="email" id="email" class="form-input" placeholder="hr@company.com" required></div>
                <div class="form-group"><label class="form-label">Password</label><input type="password" id="password" class="form-input" placeholder="Your password" required></div>
                <div class="form-row"><label class="checkbox-label"><input type="checkbox" checked>Remember me</label><a href="#" class="forgot-link">Forgot?</a></div>
                <button type="submit" class="btn btn-primary" id="lb" style="background:linear-gradient(135deg,var(--amber),var(--gold));color:#000;">
                    Sign In <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </form>
            <div class="divider"><span>demo credentials</span></div>
            <div style="background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:11px;padding:12px 16px;font-size:13px;color:var(--text-secondary);line-height:2.2;cursor:pointer;" id="demoFill">
                📧 <strong style="color:var(--gold-light);">demo@company.com</strong><br>
                🔑 <strong style="color:var(--gold-light);">demo1234</strong>
                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Click to auto-fill</div>
            </div>
            <p class="login-footer" style="margin-top:20px;">No account? <a href="/company/register" style="color:var(--gold-light);">Register your company</a></p>
            <p class="login-footer" style="margin-top:8px;"><a href="/check" style="color:var(--emerald-light);">← Check my resume (no account)</a></p>
        </div>
    </div>
    <footer class="site-footer" style="margin-left:0;">© 2026 ATS Pro</footer>
</div>

<script src="/static/js/glass-admin-script.js"></script>
<script>
if(localStorage.getItem('ats_company_token')) window.location.href='/company';
document.getElementById('demoFill').onclick=()=>{document.getElementById('email').value='demo@company.com';document.getElementById('password').value='demo1234';};
document.getElementById('lf').addEventListener('submit',async function(e){
    e.preventDefault();
    const btn=document.getElementById('lb'),err=document.getElementById('err');
    btn.disabled=true;btn.textContent='Signing in...';err.style.display='none';
    try{
        const res=await fetch('/api/company/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
        const d=await res.json();
        if(!res.ok)throw new Error(d.error||'Login failed');
        localStorage.setItem('ats_company_token',d.token);
        localStorage.setItem('ats_company',JSON.stringify(d.company));
        window.location.href='/company';
    }catch(ex){err.textContent=ex.message;err.style.display='block';btn.disabled=false;btn.innerHTML='Sign In <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';}
});
</script>
</body>
</html>

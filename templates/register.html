<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — ATS Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/glass-admin.css">
</head>
<body>
<div class="background"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-page">
    <button class="theme-toggle-float" id="theme-toggle" title="Toggle Theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">A</div>
                <h1 class="login-title">Create Account</h1>
                <p class="login-subtitle">Start smarter hiring with ATS Pro</p>
            </div>

            <div id="errorMsg" style="display:none;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#f87171;text-align:center;"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Jane Smith" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Company Name</label>
                    <input type="text" id="company" class="form-input" placeholder="Acme Corp (optional)">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="jane@company.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password <span style="color:var(--text-muted);font-size:11px;">(min 6 characters)</span></label>
                    <input type="password" id="password" class="form-input" placeholder="Create a strong password" required>
                </div>
                <div class="form-row" style="margin-bottom:24px;">
                    <label class="checkbox-label">
                        <input type="checkbox" required>
                        I agree to the <a href="#" style="color:var(--emerald-light);">Terms & Conditions</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">
                    Create Account
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </button>
            </form>

            <p class="login-footer" style="margin-top:24px;">
                Already have an account? <a href="/login">Sign In</a>
            </p>
        </div>
    </div>
    <footer class="site-footer" style="margin-left:0;"><p>© 2026 ATS Pro</p></footer>
</div>

<script src="/static/js/glass-admin-script.js"></script>
<script>
if (localStorage.getItem('ats_token')) window.location.href = '/';

document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    const errDiv = document.getElementById('errorMsg');
    btn.disabled = true;
    btn.innerHTML = 'Creating account...';
    errDiv.style.display = 'none';
    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                company: document.getElementById('company').value
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        localStorage.setItem('ats_token', data.token);
        localStorage.setItem('ats_user', JSON.stringify(data.user));
        window.location.href = '/';
    } catch(err) {
        errDiv.textContent = err.message;
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = `Create Account <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
    }
});
</script>
</body>
</html>

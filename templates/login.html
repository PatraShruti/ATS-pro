<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ATS Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/glass-admin.css">
</head>
<body>
<div class="background"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-page">
    <button class="theme-toggle-float" id="theme-toggle" title="Toggle Theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/>
            <path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/>
            <path d="M2 12h2"/><path d="M20 12h2"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">A</div>
                <h1 class="login-title">Welcome to ATS Pro</h1>
                <p class="login-subtitle">AI-Powered Applicant Tracking System</p>
            </div>

            <div id="errorMsg" style="display:none;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#f87171;text-align:center;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" checked> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Sign In
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </button>
            </form>

            <div class="divider"><span>demo account</span></div>
            <div style="background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:12px;padding:14px 18px;font-size:13px;color:var(--text-secondary);line-height:2.2;">
                📧 <strong style="color:var(--emerald-light);">demo@atspro.com</strong><br>
                🔑 <strong style="color:var(--emerald-light);">demo1234</strong>
            </div>

            <p class="login-footer" style="margin-top:24px;">
                Don't have an account? <a href="/register">Create Account</a>
            </p>
        </div>
    </div>

    <footer class="site-footer" style="margin-left:0;">
        <p>© 2026 ATS Pro — AI-Powered Hiring Platform</p>
    </footer>
</div>

<script src="/static/js/glass-admin-script.js"></script>
<script>
// Redirect if already logged in
if (localStorage.getItem('ats_token')) window.location.href = '/';

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errDiv = document.getElementById('errorMsg');
    btn.disabled = true;
    btn.innerHTML = 'Signing in...';
    errDiv.style.display = 'none';

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('ats_token', data.token);
        localStorage.setItem('ats_user', JSON.stringify(data.user));
        window.location.href = '/';
    } catch(err) {
        errDiv.textContent = err.message;
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = `Sign In <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
    }
});

// Auto-fill demo
document.querySelector('.divider').nextElementSibling.addEventListener('click', function() {
    document.getElementById('email').value = 'demo@atspro.com';
    document.getElementById('password').value = 'demo1234';
});
</script>
</body>
</html>
